    async get(key) { try { const v = localStorage.getItem(PREFIX + key); if (v === null || v === undefined) return null; return { key, value: v, shared: false }; } catch(e) { console.error('storage.get error', e); return null; } },
    async set(key, value) { try { localStorage.setItem(PREFIX + key, value); return { key, value, shared: false }; } catch(e) { console.error('storage.set error', e); return null; } },
    async delete(key) { try { localStorage.removeItem(PREFIX + key); return { key, deleted: true, shared: false }; } catch(e) { console.error('storage.delete error', e); return null; } },
    async list(prefix) { try { const keys = []; const p = PREFIX + (prefix || ''); for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k && k.startsWith(p)) keys.push(k.slice(PREFIX.length)); } return { keys, shared: false }; } catch(e) { console.error('storage.list error', e); return null; } }

})();

// --- OTTIMIZZAZIONE ADATTIVA PESI ----------------------------------------
// Calcola lift su finestra globale E su finestra mobile recente (ultime 25)
// Combina i due per un peso "del momento" sensibile al periodo corrente
function optimizeWeights(draws) {
    if (draws.length < 20)
        return null;
    const variables = ["hot10", "hot20", "hot30", "delay", "posFreq", "parity", "decade", "pair", "returnCycle", "gapSignature"];
    function computeLifts(drawSubset, label) {
        const testCount = Math.min(30, drawSubset.length - 8);
        const varHits = {};
        variables.forEach(v => varHits[v] = { sh: 0, sc: 0, nh: 0, nc: 0 });
        for (let i = 0; i < testCount; i++) {
            const training = drawSubset.slice(i + 1);
            if (training.length < 10)
                continue;
            const real = drawSubset[i][2];
            const stats = computeStats(training);
            if (!stats)
                continue;
            real.forEach(n => {
                const pos = real.indexOf(n);
                // hot10
                const h10 = stats.freq10[n] >= 2;
                varHits.hot10[h10 ? "sh" : "nh"]++;
                varHits.hot10[h10 ? "sc" : "nc"]++;
                // hot20
                const h20 = stats.freq20[n] >= 2;
                varHits.hot20[h20 ? "sh" : "nh"]++;
                varHits.hot20[h20 ? "sc" : "nc"]++;
                // hot30
                const h30 = stats.freq30[n] >= 2;
                varHits.hot30[h30 ? "sh" : "nh"]++;
                varHits.hot30[h30 ? "sc" : "nc"]++;
                // delay ottimale
                const d = stats.lastSeen[n];
                const delayOk = d >= 8 && d <= 25;
                varHits.delay[delayOk ? "sh" : "nh"]++;
                varHits.delay[delayOk ? "sc" : "nc"]++;
                // posFreq
                if (pos >= 0 && pos < 6) {
                    const isTop = stats.posStats[pos].topNums.some(t => t.n === n);
                    varHits.posFreq[isTop ? "sh" : "nh"]++;
                    varHits.posFreq[isTop ? "sc" : "nc"]++;
                }
                // parita adattiva: usa soglia calcolata per questa posizione
                if (pos >= 0 && pos < 6) {
                    const ps = stats.posStats[pos];
                    const adaptThresh = ps.parityThreshold?.threshold || 5;
                    const parSig = ps.streak >= adaptThresh;
                    const parOk = parSig && (n % 2 !== ps.lastParity);
                    varHits.parity[parSig ? (parOk ? "sh" : "nh") : "nh"]++;
                    varHits.parity[parSig ? "sc" : "nc"]++;
                }
                // decade
                const dec = n <= 30 ? 0 : n <= 60 ? 1 : 2;
                const decCnt = real.filter(x => (x <= 30 ? 0 : x <= 60 ? 1 : 2) === dec).length;
                const decOk = decCnt <= 1;
                varHits.decade[decOk ? "sh" : "nh"]++;
                varHits.decade[decOk ? "sc" : "nc"]++;
                // pair
                const partners = real.filter(x => x !== n);
                const hasPair = partners.some(p => {
                    const k = `${Math.min(n, p)}-${Math.max(n, p)}`;
                    return stats.topPairs.some(([pk]) => pk === k);
                });
                varHits.pair[hasPair ? "sh" : "nh"]++;
                varHits.pair[hasPair ? "sc" : "nc"]++;
                // returnCycle
                const rp = stats.returnPressure[n] >= 2;
                varHits.returnCycle[rp ? "sh" : "nh"]++;
                varHits.returnCycle[rp ? "sc" : "nc"]++;
                // gapSignature: il gap con il numero precedente e vicino al profilo recente?
                if (pos > 0) {

    for (let w = minW; w <= Math.min(maxW, draws.length - 2); w++) {
        // Gap orizzontali: deviazione dei gap interni a ogni sestina

            const g = d[2].map((n, i) => i > 0 ? n - d[2][i - 1] : null).filter(Boolean);
            return madDev(g);
        });
        const hScore = madDev(hDevs); // MAD delle deviazioni orizzontali
        // Gap verticali: per ogni posizione, MAD dei valori nel periodo
        let vScore = 0;
        for (let pos = 0; pos < 6; pos++) {

            vScore += madDev(vals);
        }
        vScore /= 6;

// Calcola i bound verticali e il profilo orizzontale sulla finestra ottimale

function buildMareaMatrix(draws, windowSize) {

            median: median(vals),
            p75: percentile(vals, 75),
            p90: percentile(vals, 90),
            mad: madDev(vals),
            iqr: iqr(vals),
            // "Canale attivo": P25-P75, dove cade il 50% dei valori
            active_min: percentile(vals, 25),
            active_max: percentile(vals, 75),
        };
    });
    // Orizzontale: profilo dei gap tra posizioni consecutive
    const gapProfiles = Array.from({ length: 5 }, (_, i) => {
        const gaps = slice.map(d => d[2][i + 1] - d[2][i]);
        return {
            median: median(gaps),
            mad: madDev(gaps),
            p25: percentile(gaps, 25),
            p75: percentile(gaps, 75),
            iqr: iqr(gaps),

    // Per ogni sestina: classifica se il gap piu grande e in posizione iniziale, media o finale

        const g = [d[2][1] - d[2][0], d[2][2] - d[2][1], d[2][3] - d[2][2], d[2][4] - d[2][3], d[2][5] - d[2][4]];

    const vGaps = Array.from({ length: 6 }, (_, pos) => {
        const diffs = [];
        for (let i = 0; i < slice.length - 1; i++) {
            diffs.push(Math.abs(slice[i][2][pos] - slice[i + 1][2][pos]));
        }
        return {
            median: median(diffs),
            mad: madDev(diffs),
            iqr: iqr(diffs),
            // Posizioni con bassa mobilita verticale = "ancorate"
            anchored: madDev(diffs) < 8,

}

// Rileva quando la superficie H+V cambia forma significativamente

function detectSettingChanges(draws) {

        return { changes: [], patterns: [] };

    const winSize = 8; // finestra locale per confronto
    for (let i = winSize; i < draws.length - winSize; i++) {
        const before = draws.slice(i, i + winSize);
        const after = draws.slice(i - winSize, i);
        // Score H: differenza nei profili di gap orizzontale
        let hDiff = 0;
        for (let pos = 0; pos < 5; pos++) {
            const gBefore = before.map(d => d[2][pos + 1] - d[2][pos]);
            const gAfter = after.map(d => d[2][pos + 1] - d[2][pos]);
            hDiff += Math.abs(median(gBefore) - median(gAfter));
        }
        hDiff /= 5;
        // Score V: differenza nei profili verticali
        let vDiff = 0;
        for (let pos = 0; pos < 6; pos++) {
            const vBefore = before.map(d => d[2][pos]);
            const vAfter = after.map(d => d[2][pos]);
            vDiff += Math.abs(median(vBefore) - median(vAfter));
        }
        vDiff /= 6;
        const totalDiff = hDiff + vDiff;
        if (totalDiff > 12) { // soglia cambio significativo
            changes.push({
                idx: i,
                date: draws[i][0],
                conc: draws[i][1],
                hDiff: hDiff.toFixed(1),
                vDiff: vDiff.toFixed(1),
                totalDiff: totalDiff.toFixed(1),
                // Cosa ha preceduto il cambio
                trigger: draws.slice(i, i + 3).map(d => d[2]),
            });
        }
    }
    // Cerca pattern nelle sequenze che precedono i cambi
    // (somma alta/bassa, gap concentrati, etc)
    const patterns = changes.map(c => {
        const preDraw = draws[c.idx + 1]?.[2] || [];
        const sum = preDraw.reduce((s, n) => s + n, 0);
        const gaps = preDraw.map((n, i) => i > 0 ? n - preDraw[i - 1] : null).filter(Boolean);
        return {
            date: c.date,
            totalDiff: c.totalDiff,
            preSum: sum,
            preMaxGap: gaps.length ? Math.max(...gaps) : 0,
            preMinGap: gaps.length ? Math.min(...gaps) : 0,
        };
    });
    return { changes, patterns };
}

            min: Math.max(1, Math.round(mareaAnchor.p10)),
            max: Math.min(90, Math.round(mareaAnchor.p90)),
            activeMin: Math.round(mareaAnchor.active_min),
            activeMax: Math.round(mareaAnchor.active_max),
            evens, odds, streak, lastParity,
            topNums, posFreqAll, posFreq10, posFreq20,
            parityThreshold: parityThresholds[pos],
            parityBias, parityBiasStrength,
            rangeCompression,
            recentAvg: median(recent),
            recentStd: recentIqr,
            historicStd: historicIqr,
            anchored: vGapInfo.anchored,
            vMobility: vGapInfo.median,

    });
    const decadeFreq = [0, 0, 0];
    draws.forEach(d => d[2].forEach(n => { if (n <= 30)

        decadeFreq[2]++; }));
    const topPairs = Object.entries(pairCount).filter(([, v]) => v >= 2).sort((a, b) => b[1] - a[1]).slice(0, 20);
    const topTriples = Object.entries(tripleCount).filter(([, v]) => v >= 2).sort((a, b) => b[1] - a[1]).slice(0, 10);
    const topPairsWithDelay = Object.entries(pairCount).filter(([, v]) => v >= 3)
        .map(([k, v]) => ({ k, freq: v, delay: pairLastSeen[k] || 999 }))
        .sort((a, b) => (b.freq * b.delay) - (a.freq * a.delay)).slice(0, 15);

        const gaps = draws.map(d => d[2][i + 1] - d[2][i]);

        posStats, decadeFreq,
        topPairs, topTriples, topPairsWithDelay,
        gapStats, recentGapProfile: marea.gapProfiles.map(gp => gp.median),
        returnPressure,
        sumAvg, sumStd, sumMedian, sumMad,
        rsMedian, rsMad,
        hvRatioByPos, skipHitByPos, verticalVolatility,
        filterParams, marea, optWindow, N

}

// Classifica ogni estrazione in un "setting" tridimensionale:
// S = livello somma, D = decade dominante, F = freschi
// Poi determina le transizioni piu probabili
function computeCurrentSetting(draws) {
    if (draws.length < 5)
        return null;
    const sums = draws.map(d => d[2].reduce((s, n) => s + n, 0));
    const sumMed = median(sums);
    const sumMadVal = madDev(sums);
    const classify = (nums, prevNums) => {
        const sum = nums.reduce((s, n) => s + n, 0);
        const S = sum > sumMed + sumMadVal * 0.5 ? 'S+' : sum < sumMed - sumMadVal * 0.5 ? 'S-' : 'S=';
        const d = [nums.filter(n => n <= 30).length, nums.filter(n => n > 30 && n <= 60).length, nums.filter(n => n > 60).length];
        const D = d[0] >= 3 ? 'D1' : d[1] >= 3 ? 'D2' : d[2] >= 3 ? 'D3' : 'Dmix';
        const fresh = prevNums ? nums.filter(n => prevNums.includes(n)).length : 0;
        const F = fresh >= 2 ? 'F2+' : fresh === 1 ? 'F1' : 'F0';
        return { code: S + '|' + D + '|' + F, S, D, F, sum, fresh };
    };
    const history = draws.map((d, i) => ({
        ...classify(d[2], draws[i + 1]?.[2] || null),
        date: d[0], concorso: d[1]
    }));
    const current = history[0];
    const transitions = {};
    for (let i = 0; i < history.length - 1; i++) {
        const from = history[i + 1].code;
        const to = history[i].code;
        if (!transitions[from])
            transitions[from] = {};
        transitions[from][to] = (transitions[from][to] || 0) + 1;
    }
    const fromCurrent = transitions[current.code] || {};
    const total = Object.values(fromCurrent).reduce((s, v) => s + v, 0);
    const likely = Object.entries(fromCurrent)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([code, cnt]) => ({ code, pct: Math.round(cnt / total * 100), cnt }));
    const sumTrans = { afterHigh: { S_plus: 0, S_eq: 0, S_minus: 0 }, afterLow: { S_plus: 0, S_eq: 0, S_minus: 0 } };
    for (let i = 0; i < history.length - 1; i++) {
        const from = history[i + 1].S;
        const to = history[i].S;
        if (from === 'S+')
            sumTrans.afterHigh[to === 'S+' ? 'S_plus' : to === 'S=' ? 'S_eq' : 'S_minus']++;
        if (from === 'S-')
            sumTrans.afterLow[to === 'S+' ? 'S_plus' : to === 'S=' ? 'S_eq' : 'S_minus']++;
    }
    const freshStats = {
        rate: history.filter(h => h.F !== 'F0').length / history.length,
        avgCount: history.reduce((s, h) => s + h.fresh, 0) / history.length
    };
    return { current, history: history.slice(0, 10), likely, transitions, sumTrans, freshStats, sumMed, sumMadVal };
}
// --- GENERATORE SESTINA   con filtri di esclusione e nuove variabili -----
function generateSestina(draws, weights = null, _stats = null, _flow = null, _setting = null) {
    const stats = _stats || computeStats(draws);
    if (!stats)
        return null;
    const flow = _flow || findFlowSegments(draws);
    const setting = _setting || computeCurrentSetting(draws);
    const { freq10, freq20, freq30, lastSeen, posStats, gapStats, topPairs, topPairsWithDelay, marea, hvRatioByPos, returnPressure, sumMedian, sumMad, filterParams } = stats;
    const W = weights || { hot10: 5, hot20: 5, hot30: 5, delay: 5, posFreq: 5,
        parity: 5, decade: 2, pair: 2, returnCycle: 2, gapSignature: 2.5,
        hvRatio: 5, skipHit: 2, vertVol: 1 };
    const pairSet = new Map();
    topPairs.forEach(([k, v]) => pairSet.set(k, v));
    const duePairSet = new Set(topPairsWithDelay.map(p => p.k));
    const currSeg = flow?.currentSeg;
    const useSegProfile = currSeg && currSeg.len >= 3;
    const likelySumDir = setting?.likely?.[0]?.code?.split('|')[0] || 'S=';
    const sumBias = likelySumDir === 'S+' ? 1.15 : likelySumDir === 'S-' ? 0.85 : 1.0;
    const fasciaCount = [0, 0, 0];
    draws.slice(0, 3).forEach(d => d[2].forEach(n => {
        if (n <= 30)
            fasciaCount[0]++;
        else if (n <= 60)
            fasciaCount[1]++;
        else
            fasciaCount[2]++;
    }));
    const fasciaMax = Math.max(...fasciaCount);
    const fasciaDom = fasciaCount.indexOf(fasciaMax);
    // Genera candidati con filtraggio a cascata + esclusione
    let result = [];
    let attempts = 0;
    const maxAttempts = 300;
    while (attempts < maxAttempts) {
        attempts++;
        result = [];
        let valid = true;
        for (let pos = 0; pos < 6; pos++) {
            const ps = posStats[pos];
            const mb = marea.vBounds[pos];
            // Vincolo primario: profilo del segmento corrente
            let segMin, segMax;
            if (useSegProfile) {
                const sp = currSeg.vProfile[pos];
                segMin = Math.max(1, sp.lo);
                segMax = Math.min(90, sp.hi);
            }
            else {
                segMin = Math.max(1, Math.round(mb.p10));
                segMax = Math.min(90, Math.round(mb.p90));
            }
            const cascadeMin = pos === 0 ? segMin : Math.max(segMin, result[pos - 1] + 1);
            const cascadeMax = segMax - (5 - pos);
            if (cascadeMax < cascadeMin) {
                valid = false;
                break;
            }
            const adaptiveParityThresh = ps.parityThreshold?.threshold || 5;
            const activeMin = Math.round(mb.active_min);
            const activeMax = Math.round(mb.active_max);
            const candidates = [];
            for (let n = cascadeMin; n <= cascadeMax; n++) {
                if (result.includes(n))
                    continue;
                const delay = lastSeen[n];
                let freshPenalty = 0;
                if (delay === 0)
                    freshPenalty = -3.0;
                else if (delay === 1)
                    freshPenalty = -1.5;
                else if (delay === 2)
                    freshPenalty = -0.6;
                if (delay > 40 && freq20[n] === 0)
                    continue;
                let score = 1 + freshPenalty;
                // Profilo verticale del segmento
                if (useSegProfile) {
                    const sp = currSeg.vProfile[pos];
                    const distFromMed = Math.abs(n - sp.med);
                    score += Math.max(0, (2 - distFromMed / Math.max(sp.mad, 1))) * 2.0;
                }
                // Canale attivo marea
                if (n >= activeMin && n <= activeMax)
                    score += 1.2;
                // Slot ancorato vs nomade
                if (ps.anchored) {
                    const distFromMedian = Math.abs(n - mb.median);
                    score += Math.max(0, (mb.mad * 2 - distFromMedian) / (mb.mad * 2)) * W.posFreq;
                }
                else {
                    score += ps.posFreqAll[n] * W.posFreq * 0.4;
                    score += ps.posFreq20[n] * W.posFreq;
                }
                // Temperatura
                score += freq10[n] * W.hot10 + freq20[n] * W.hot20 + freq30[n] * W.hot30;
                // Ritardo
                if (delay >= 8 && delay <= 25)
                    score += W.delay * 2;
                else if (delay > 25 && delay <= 35)
                    score += W.delay;
                else if (delay >= 3 && delay < 8)
                    score += W.delay * 0.4;
                // -- SKIP & HIT PER POSIZIONE
                // Bonus se il ritardo del numero e vicino al ciclo mediano della posizione
                const sh = ps.skipHit;
                if (delay > 0 && delay < 999) {
                    const cycleDeviation = Math.abs(delay - sh.medCycle) / Math.max(sh.madCycle, 1);
                    if (cycleDeviation <= 0.5)
                        score += W.skipHit * 2;
                    else if (cycleDeviation <= 1.0)
                        score += W.skipHit;
                }
                // -- VOLATILITA VERTICALE
                // P1 volatile: bonus per numeri lontani dall'ultimo; P6 stazionaria: bonus per numeri vicini
                const vv = ps.vertVolatility;
                if (pos === 0 || pos === 1) { // alta volatilita
                    const lastVal = draws[0][2][pos];
                    const dist = Math.abs(n - lastVal);
                    if (dist > vv.mad * 1.5)
                        score += W.vertVol; // lontano = atteso per P1
                }
                else if (pos === 5) { // bassa volatilita, quasi stazionaria
                    const lastVal = draws[0][2][pos];
                    const dist = Math.abs(n - lastVal);
                    if (dist < vv.mad * 2)
                        score += W.vertVol; // vicino = atteso per P6
                }
                // Parita adattiva con bias per posizione
                if (ps.streak >= adaptiveParityThresh) {
                    const wantedParity = 1 - ps.lastParity;
                    if (n % 2 === wantedParity)
                        score += W.parity * (1 + (ps.streak - adaptiveParityThresh) * 0.3);
                }
                else {
                    // Usa il bias naturale per posizione (es. P3 tende al dispari)
                    const preferredParity = ps.parityBias === 'odd' ? 1 : 0;
                    if (n % 2 === preferredParity)
                        score += W.parity * ps.parityBiasStrength * 0.5;
                }
                // Range compresso
                if (ps.rangeCompression && Math.abs(n - ps.recentAvg) > ps.recentStd * 1.5)
                    score += 1.2;
                // Decade
                const dec = n <= 30 ? 0 : n <= 60 ? 1 : 2;
                const lastDecCount = draws[0][2].filter(x => (x <= 30 ? 0 : x <= 60 ? 1 : 2) === dec).length;
                if (lastDecCount === 0)
                    score += W.decade * 1.5;
                else if (lastDecCount === 1)
                    score += W.decade * 0.5;
                if (fasciaMax >= 6 && dec === fasciaDom)
                    score -= 0.4;
                // Ciclo di ritorno
                const rp = returnPressure[n];
                if (rp >= 2)
                    score += W.returnCycle * rp * sumBias;
                else if (rp === 1)
                    score += W.returnCycle * 0.5;
                // -- GAP BIDIREZIONALE con rapporto H/V
                if (pos > 0) {
                    const gap = n - result[pos - 1];
                    const gp = gapStats[pos - 1];
                    // Gap orizzontale: profilo del segmento
                    if (useSegProfile) {
                        const hp = currSeg.hProfile[pos - 1];
                        const hDev = Math.abs(gap - hp.med);
                        if (hDev < hp.mad)
                            score += W.gapSignature * 2;
                        else if (hDev < hp.mad * 2)
                            score += W.gapSignature;
                        else if (hDev > hp.mad * 3)
                            score -= 1.0;
                    }
                    else {
                        const hGapDev = Math.abs(gap - gp.med);
                        if (hGapDev < gp.iqr * 0.5)
                            score += W.gapSignature * 1.2;
                        else if (hGapDev < gp.iqr)
                            score += W.gapSignature * 0.6;
                        else if (hGapDev > gp.iqr * 2)
                            score -= 0.5;
                    }
                    // -- RAPPORTO H/V: bonus se ratio gap/valore nel range storico
                    const hvRatio = gap / n;
                    const hvR = hvRatioByPos[pos - 1];
                    if (hvRatio >= hvR.p25 && hvRatio <= hvR.p75)
                        score += W.hvRatio * 1.5;
                    else if (hvRatio >= hvR.p10 && hvRatio <= hvR.p90)
                        score += W.hvRatio * 0.5;
                    else
                        score -= W.hvRatio * 0.5; // fuori range = penalita
                }
                // Coppia storica
                result.forEach(prev => {
                    const k = `${Math.min(prev, n)}-${Math.max(prev, n)}`;
                    const pf = pairSet.get(k) || 0;
                    score += pf * W.pair * 0.35;
                    if (duePairSet.has(k))
                        score += W.pair * 0.8;
                });
                // Somma proiettata
                const partialSum = result.reduce((s, x) => s + x, 0) + n;
                const projectedSum = partialSum + (5 - pos) * 45;
                if (Math.abs(projectedSum - sumMedian * sumBias) < sumMad * 1.5)
                    score += 0.8;
                candidates.push({ n, score });
            }
            if (!candidates.length) {
                valid = false;
                break;
            }
            candidates.sort((a, b) => b.score - a.score);
            const pool = candidates.slice(0, Math.min(6, candidates.length));
            const totalScore = pool.reduce((s, c) => s + Math.max(c.score, 0.1), 0);
            let rand = Math.random() * totalScore, chosen = pool[0].n;
            for (const c of pool) {
                rand -= Math.max(c.score, 0.1);
                if (rand <= 0) {
                    chosen = c.n;
                    break;
                }
            }
            result.push(chosen);
        }
        if (!valid || result.length !== 6)
            continue;
        // Applica filtri di esclusione alla sestina generata
        if (passesExclusionFilters(result, filterParams))
            break;
    }
    // Fallback: se non trova sestina valida dopo maxAttempts, restituisce l'ultima generata
    return result.length === 6 ? result.sort((a, b) => a - b) : null;
}
// --- PROFILO TRIDIMENSIONALE DI OGNI ESTRAZIONE --------------------------
// Somma (A/M/B) x Gap pattern (F/C/B) x Decade (D1/D2/D3/Dmix)
// Questo e il "setting" che ha prodotto quell'estrazione
function drawProfile(nums, prevDraws) {
    const sum = nums.reduce((s, n) => s + n, 0);
    const gaps = nums.map((n, i) => i > 0 ? n - nums[i - 1] : 0).slice(1);
    // Somma: usa MAD dello storico (non media)
    const prevSums = prevDraws.map(d => d[2].reduce((s, n) => s + n, 0));
    const sumMed = median(prevSums), sumMad = madDev(prevSums);
    const S = sum > sumMed + sumMad ? 'A' : sum < sumMed - sumMad ? 'B' : 'M';
    // Gap pattern
    const maxGapIdx = gaps.indexOf(Math.max(...gaps));
    const G = maxGapIdx <= 1 ? 'F' : maxGapIdx >= 3 ? 'B' : 'C';
    // Decade dominante
    const d = [nums.filter(n => n <= 30).length, nums.filter(n => n > 30 && n <= 60).length, nums.filter(n => n > 60).length];
    const D = d[0] >= 3 ? 'D1' : d[1] >= 3 ? 'D2' : d[2] >= 3 ? 'D3' : 'Dmix';
    // Freschi (numeri ripetuti dall'estrazione precedente)
    const fresh = prevDraws.length > 0 ? nums.filter(n => prevDraws[0][2].includes(n)).length : 0;
    // Numeri in ritardo ottimale (8-25)
    const lastSeen = new Array(91).fill(999);
    prevDraws.forEach((dr, idx) => dr[2].forEach(n => { if (idx < lastSeen[n])
        lastSeen[n] = idx; }));
    const optDelay = nums.filter(n => lastSeen[n] >= 8 && lastSeen[n] <= 25).length;
    // H/V ratio: quanti gap nel range storico per quella posizione
    const hvOk = gaps.filter((g, i) => {
        const pg = prevDraws.map(d => d[2][i + 1] - d[2][i]);
        const gm = median(pg), gmd = madDev(pg);
        return Math.abs(g - gm) < gmd * 1.5;
    }).length;
    const code = S + '|' + G + '|' + D;
    return { code, S, G, D, sum, fresh, optDelay, hvOk, evens: nums.filter(n => n % 2 === 0).length };
}
// Analisi sequenza setting: trova pattern ricorrenti e previsione prossimo
function analyzeSettingSequence(draws, lookback = 60) {
    if (draws.length < 15)
        return null;
    const slice = draws.slice(0, Math.min(lookback, draws.length - 5));
    // Calcola profilo per ogni estrazione
    const profiles = slice.map((d, i) => drawProfile(d[2], draws.slice(i + 1)));
    // Sequenza di setting (dal piu recente)
    const seq = profiles.map(p => p.code);
    // Frequenza setting
    const freq = {};
    seq.forEach(s => { freq[s] = (freq[s] || 0) + 1; });
    const topSettings = Object.entries(freq).sort((a, b) => b[1] - a[1]);
    // Bigram (transizioni)
    const bigrams = {};
    for (let i = 0; i < seq.length - 1; i++) {
        const from = seq[i + 1], to = seq[i]; // storico inverso
        const k = from + '->' + to;
        bigrams[k] = (bigrams[k] || 0) + 1;
    }
    // Trigram
    const trigrams = {};
    for (let i = 0; i < seq.length - 2; i++) {
        const k = seq[i + 2] + '->' + seq[i + 1] + '->' + seq[i];
        trigrams[k] = (trigrams[k] || 0) + 1;
    }
    // Setting corrente (ultima estrazione)
    const current = profiles[0];
    // Previsione: dato il setting corrente, cosa segue storicamente?
    const fromCurrent = {};
    Object.entries(bigrams).forEach(([k, v]) => {
        if (k.startsWith(current.code + '->')) {
            const to = k.split('->')[1];
            fromCurrent[to] = (fromCurrent[to] || 0) + v;
        }
    });
    const totFC = Object.values(fromCurrent).reduce((s, v) => s + v, 0) || 1;
    const nextPredictions = Object.entries(fromCurrent)
        .sort((a, b) => b[1] - a[1]).slice(0, 4)
        .map(([code, cnt]) => ({ code, pct: Math.round(cnt / totFC * 100), cnt }));
    // Trigram prediction: ultime 2 -> prossima
    let trigPred = null;
    if (seq.length >= 2) {
        const pattern = seq[1] + '->' + seq[0] + '->';
        const matching = Object.entries(trigrams)
            .filter(([k]) => k.startsWith(pattern))
            .sort((a, b) => b[1] - a[1]);
        if (matching.length > 0) {
            trigPred = { code: matching[0][0].split('->')[2], cnt: matching[0][1] };
        }
    }
    // Oscilla: trova i cicli A B (alta bassa) e alta/media/bassa frequenza
    // Guarda le ultime 15 estrazioni per il ritmo corrente
    const recent15 = seq.slice(0, 15);
    const oscillation = {
        highLow: recent15.filter(s => s[0] === 'A' || s[0] === 'B').length,
        alternates: 0,
    };
    for (let i = 0; i < recent15.length - 1; i++) {
        if ((recent15[i][0] === 'A' && recent15[i + 1][0] === 'B') ||
            (recent15[i][0] === 'B' && recent15[i + 1][0] === 'A'))
            oscillation.alternates++;
    }
    return {
        profiles, seq, topSettings, bigrams, trigrams,
        current, nextPredictions, trigPred, oscillation
    };
}
// --- MOTORE CICLI --------------------------------------------------------
function buildCycleEngine(draws) {
    if (draws.length < 30)
        return null;
    const sums = draws.map(d => d[2].reduce((s, n) => s + n, 0));
    const sumMed = median(sums), sumMad = madDev(sums);
    const classifyPhase = nums => {
        const sum = nums.reduce((s, n) => s + n, 0);
        const S = sum > sumMed + sumMad * 0.6 ? 'S+' : sum < sumMed - sumMad * 0.6 ? 'S-' : 'S=';
        const d = [nums.filter(n => n <= 30).length, nums.filter(n => n > 30 && n <= 60).length, nums.filter(n => n > 60).length];
        const D = d[0] >= 3 ? 'D1' : d[1] >= 3 ? 'D2' : d[2] >= 3 ? 'D3' : 'Dmix';
        return { S, D, code: S + '|' + D, sum };
    };
    const classified = draws.map((d, i) => ({
        ...classifyPhase(d[2]), date: d[0], conc: d[1], nums: d[2]
    }));
    // Run consecutivi della stessa fase
    const runs = [];
    let cur = classified[0].code, len = 1, start = 0;
    for (let i = 1; i <= classified.length; i++) {
        const changed = i === classified.length || classified[i].code !== cur;
        if (changed) {
            runs.push({ code: cur, len, from: start, to: start + len - 1 });
            if (i < classified.length) {
                cur = classified[i].code;
                len = 1;
                start = i;
            }
        }
        else
            len++;
    }
    // Statistiche per fase
    const phaseStats = {};
    runs.forEach(r => {
        if (!phaseStats[r.code])
            phaseStats[r.code] = { lens: [], count: 0 };
        phaseStats[r.code].lens.push(r.len);
        phaseStats[r.code].count++;
    });
    Object.values(phaseStats).forEach(ps => {
        ps.avgLen = ps.lens.reduce((s, v) => s + v, 0) / ps.lens.length;
        ps.maxLen = Math.max(...ps.lens);
    });
    // Bigram transizioni
    const bigrams = {};
    for (let i = 0; i < runs.length - 1; i++) {
        const k = runs[i + 1].code + '->' + runs[i].code;
        bigrams[k] = (bigrams[k] || 0) + 1;
    }
    // Trigram

function parseNumStr(str) {
    const s = str.replace(/\s/g, '');

        if (nums.length === 6 && pos === s.length)
            return nums;
        if (pos >= s.length || nums.length >= 6)
            return null;
        const n1 = parseInt(s[pos]);
        if (n1 > prev && n1 >= 1 && n1 <= 90) {
            const r = bt(pos + 1, n1, [...nums, n1]);
            if (r)
                return r;
        }
        if (pos + 1 < s.length) {
            const n2 = parseInt(s.slice(pos, pos + 2));
            if (n2 > prev && n2 >= 1 && n2 <= 90) {
                const r = bt(pos + 2, n2, [...nums, n2]);
                if (r)
                    return r;
            }
        }
        return null;
    }
    return bt(0, 0, []);
}
