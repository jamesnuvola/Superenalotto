name: Ricalibrazione automatica periodica

on:
  schedule:
    # Il primo giorno di ogni mese alle 6:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch: {} # permette anche l'avvio manuale da GitHub

permissions:
  contents: write

jobs:
  ricalibra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Esegui la ricalibrazione automatica
        run: node scripts/auto-recalibrate.mjs

      - name: Commit del report (se cambiato)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RICALIBRAZIONE_REPORT.md
          git diff --staged --quiet || git commit -m "Report di ricalibrazione automatica $(date +%Y-%m-%d)"
          git push
